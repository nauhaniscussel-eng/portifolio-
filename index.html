<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>portifolio</title>
    <link rel="stylesheet" href="style.css">

<body>
    <header></header>
    <main></main>
    
    <main style="display: flex; align-items: center; justify-content: space-between; background-color: #000000; padding: 10% 15%; min-height: 100vh; box-sizing: border-box; font-family: sans-serif;">

        <!-- COLUNA DA ESQUERDA: Textos e Botões -->
        <div style="flex: 1; max-width: 50%; color: #FFFFFF;">
          
          <!-- Título em 3 linhas com destaque azul -->
          <h1 style="font-size: 36px; line-height: 1.3; margin-bottom: 24px;">
            Eleve seu negócio digital <br>
            a outro nível <span style="color: #22D4FD;">com um <br>
            Front-end de qualidade!</span>
          </h1>
      
          <!-- Subtítulo em 4 linhas -->
          <p style="font-size: 18px; line-height: 1.5; color: #C0C0C0; margin-bottom: 32px;">
            Olá! Sou Joana Santos, desenvolvedora Front-end <br>
            com especialidade em React, HTML e CSS. Ajudo <br>
            pequenos negócios e designers a colocarem em <br>
            prática boas ideias. Vamos conversar?
          </p>
      
          <!-- Bloco dos Botões -->
          <div style="display: flex; gap: 16px;">
            <a href="#" style="background-color: #22D4FD; color: #000000; font-weight: bold; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-size: 16px;">Instagram</a>
            <a href="#" style="background-color: #22D4FD; color: #000000; font-weight: bold; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-size: 16px;">GitHub</a>
          </div>
      
        </div>
      
        <!-- COLUNA DA DIREITA: Imagem -->
        <div style="flex: 1; display: flex; justify-content: flex-end;">
          <!-- Insira o nome ou caminho do seu arquivo de imagem no src -->
          <img src="Imagem.png" alt="Foto de Joana Santos" style="max-width: 400px; width: 100%; height: auto; border-radius: 16px; border: 2px solid #22D4FD;">
        </div>
      
      </main>
      
  </h2>
  
   
    
    <a href="http://Instagram.com/nauhani_scussel"></a>
